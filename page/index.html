<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LGPT Theme Tester</title>

<style>
:root {
    --background: #000000;
    --foreground: #F5EBFF;
    --border: #FF00DD;
    --hicolor1: #B750D1;
    --hicolor2: #DB33DB;
    --cursorcolor: #FF00DD;
    --playcolor: #FF00DD;
    --mutecolor: #FFFFFF;
    --songview_fe: #A55B8F;
    --songview_00: #853B6F;
    --rowcolor1: #BA28F9;
    --rowcolor2: #FF00FF;
}

body {
    background: #111;
    color: white;
    font-family: monospace;
    margin: 0;
    padding: 20px;
    display: flex;
    gap: 20px;
}

.panel {
    flex: 1;
}

.preview {
    background: var(--background);
    color: var(--foreground);
    border: 4px solid var(--border);
    padding: 15px;
}

.row:nth-child(odd) { color: var(--rowcolor1); }
.row:nth-child(even) { color: var(--rowcolor2); }

.highlight1 { color: var(--hicolor1); }
.highlight2 { color: var(--hicolor2); }
.cursor { background: var(--cursorcolor); color: black; }
.play { color: var(--playcolor); }
.mute { color: var(--mutecolor); }
.fe { color: var(--songview_fe); }
.zero { color: var(--songview_00); }

textarea {
    width: 100%;
    height: 300px;
    background: #222;
    color: white;
    border: 1px solid #444;
    padding: 10px;
}

.color-grid {
    display: grid;
    grid-template-columns: 1fr 60px;
    gap: 6px;
    margin-bottom: 20px;
}

input[type="color"] {
    width: 100%;
    height: 30px;
    border: none;
    cursor: pointer;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="panel">
    <h2>Theme Preview</h2>
    <div class="preview">
        <div class="row">00 <span class="highlight1">NOTE C-4</span> <span class="play">▶</span></div>
        <div class="row">01 <span class="highlight2">NOTE D#4</span></div>
        <div class="row">02 <span class="cursor">CURSOR</span></div>
        <div class="row">03 <span class="mute">MUTED</span></div>
        <div class="row">FE <span class="fe">CHAIN FE</span></div>
        <div class="row">00 <span class="zero">CHAIN 00</span></div>
    </div>

    <h2>Color Pickers</h2>
    <div class="color-grid" id="colorPickers"></div>
</div>

<div class="panel">
    <h2>Paste CONFIG File</h2>
    <textarea id="configInput"></textarea>
    <button onclick="applyConfig()">Apply Config</button>
    <button onclick="exportConfig()">Export Config</button>
</div>

<script>
const keys = [
"BACKGROUND","FOREGROUND","BORDER","HICOLOR1","HICOLOR2",
"CURSORCOLOR","PLAYCOLOR","MUTECOLOR",
"SONGVIEW_FE","SONGVIEW_00",
"ROWCOLOR1","ROWCOLOR2"
];

const cssMap = {
BACKGROUND:"--background",
FOREGROUND:"--foreground",
BORDER:"--border",
HICOLOR1:"--hicolor1",
HICOLOR2:"--hicolor2",
CURSORCOLOR:"--cursorcolor",
PLAYCOLOR:"--playcolor",
MUTECOLOR:"--mutecolor",
SONGVIEW_FE:"--songview_fe",
SONGVIEW_00:"--songview_00",
ROWCOLOR1:"--rowcolor1",
ROWCOLOR2:"--rowcolor2"
};

const pickerContainer = document.getElementById("colorPickers");

keys.forEach(key => {
    const label = document.createElement("label");
    label.textContent = key;
    const input = document.createElement("input");
    input.type = "color";
    input.value = getComputedStyle(document.documentElement)
        .getPropertyValue(cssMap[key]).trim();
    input.oninput = () => {
        document.documentElement.style.setProperty(cssMap[key], input.value);
    };
    pickerContainer.appendChild(label);
    pickerContainer.appendChild(input);
});

function applyConfig() {
    const text = document.getElementById("configInput").value;
    keys.forEach(key => {
        const regex = new RegExp(`${key}\\s+value\\s*=\\s*"(.*?)"`);
        const match = text.match(regex);
        if (match) {
            const hex = "#" + match[1];
            document.documentElement.style.setProperty(cssMap[key], hex);
            updatePicker(key, hex);
        }
    });
}

function updatePicker(key, hex) {
    const inputs = pickerContainer.querySelectorAll("input");
    keys.forEach((k, i) => {
        if (k === key) inputs[i].value = hex;
    });
}

function exportConfig() {
    let output = "<CONFIG>\n";
    keys.forEach(key => {
        const value = getComputedStyle(document.documentElement)
            .getPropertyValue(cssMap[key]).replace("#","");
        output += `    <${key.padEnd(13)} value = "${value.trim()}" />\n`;
    });
    output += `    <ALTROWNUMBER value = "4" />\n</CONFIG>`;
    document.getElementById("configInput").value = output;
}
</script>

</body>
</html>
